name: CI — NutriVet.IA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Cobertura + SAST
    runs-on: ubuntu-latest

    env:
      # Variables mínimas para que los tests corran sin DB real
      JWT_SECRET_KEY: ci_test_secret_key_not_for_production
      JWT_ALGORITHM: HS256
      FERNET_KEY: "dGVzdF9rZXlfZm9yX2NpX29ubHlfMzJfYnl0ZXNfbG9uZw=="
      OPENROUTER_API_KEY: "sk-or-fake-ci-key"
      DATABASE_URL_ASYNC: "postgresql+asyncpg://localhost:5432/nutrivet_test"
      MVP_FREEMIUM_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Instalar dependencias
        run: uv sync --frozen

      # SAST — bandit (severidad HIGH/MEDIUM bloquea el PR)
      - name: SAST — bandit
        run: uv run bandit -r backend/ -ll -ii --exit-zero -f json -o bandit-report.json

      - name: Verificar 0 issues HIGH/MEDIUM en bandit
        run: |
          uv run python - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          issues = [
              i for i in report.get("results", [])
              if i["issue_severity"] in ("HIGH", "MEDIUM")
          ]
          if issues:
              for i in issues:
                  print(f"[{i['issue_severity']}] {i['filename']}:{i['line_number']} — {i['issue_text']}")
              sys.exit(1)
          print(f"bandit: 0 issues HIGH/MEDIUM ✓ ({len(report.get('results', []))} LOW ignorados)")
          EOF

      # Dependencias — safety (CVEs HIGH bloquean el PR)
      - name: Dependencias — safety check
        run: |
          uv run safety check --full-report --output json > safety-report.json 2>&1 || true
          uv run python - <<'EOF'
          import json, sys, os
          try:
              with open("safety-report.json") as f:
                  content = f.read()
              # safety puede devolver formatos distintos según versión
              if "No known security vulnerabilities" in content:
                  print("safety: 0 vulnerabilidades conocidas ✓")
                  sys.exit(0)
              print("safety report:")
              print(content[:2000])
              # No bloquear por ahora — revisar manualmente en logs
              # Para bloquear: sys.exit(1)
          except Exception as e:
              print(f"safety check parse error: {e} — revisar logs manualmente")
          EOF

      # Tests con cobertura mínima 80% en domain layer (G5)
      - name: Tests — domain layer (G5 cobertura >= 80%)
        run: |
          uv run python -m pytest tests/domain/ \
            --cov=backend/domain \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            -v --tb=short

      # Caso Sally — Golden Case G8 (±0.5 kcal)
      - name: Golden Case Sally (G8)
        run: |
          uv run python -m pytest tests/ -k "sally" -v --tb=short

      # Suite completa (sin integration/e2e que necesitan DB)
      - name: Suite completa
        run: |
          uv run python -m pytest tests/ -q --tb=short \
            --ignore=tests/integration \
            --ignore=tests/e2e

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
